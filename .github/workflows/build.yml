name: Compilar Arvore OS
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Instalar GCC ARM
      run: sudo apt update && sudo apt install -y gcc-arm-none-eabi
    - name: Compilar
      run: |
        arm-none-eabi-gcc -mcpu=cortex-m0plus -mthumb -c boot/bootloader.asm -o boot.o
        arm-none-eabi-gcc -mcpu=cortex-m0plus -mthumb -c kernel/kernel_baremetal.c -o kernel.o
        arm-none-eabi-ld boot.o kernel.o -T boot/link.ld -o arvore_os.elf
        arm-none-eabi-objcopy -O binary arvore_os.elf arvore_os.uf2
    - name: Salvar.uf2
      uses: actions/upload-artifact@v4
      with:
        name: arvore_os
        path: arvore_os.uf2
